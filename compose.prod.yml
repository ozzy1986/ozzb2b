name: ozzb2b

# Production compose for the single-VPS deployment.
#
# Uses the host's existing Postgres and Redis (accessed via host.docker.internal
# or 172.17.0.1 on Linux hosts) to stay within the VPS memory budget.
# Meilisearch runs in-stack because it is small and stateless apart from its index volume.

services:
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: ozzb2b-meilisearch
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      MEILI_ENV: production
      # MEILI_MASTER_KEY comes from `.env.prod` (`OZZB2B_MEILISEARCH_KEY` mapping if needed upstream).
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - /var/www/ozzb2b.com/data/meilisearch:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    image: ozzb2b-api:local
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ozzb2b-api
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      OZZB2B_ENV: production
    ports:
      - "127.0.0.1:8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').getcode()==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 6

  web:
    image: ozzb2b-web:local
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ozzb2b-web
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      NODE_ENV: production
      OZZB2B_API_URL: http://api:8000
    ports:
      - "127.0.0.1:3101:3000"
    depends_on:
      api:
        condition: service_healthy

  scraper:
    image: ozzb2b-scraper:local
    build:
      context: ./apps/scraper
      dockerfile: Dockerfile
    container_name: ozzb2b-scraper
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      OZZB2B_ENV: production
    command:
      [
        "celery",
        "-A",
        "ozzb2b_scraper.tasks",
        "worker",
        "--loglevel=INFO",
        "--concurrency=1",
      ]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  chat:
    image: ozzb2b-chat:local
    build:
      context: ./apps/chat
      dockerfile: Dockerfile
    container_name: ozzb2b-chat
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      OZZB2B_CHAT_HTTP_ADDR: ":8090"
    ports:
      - "127.0.0.1:8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  matcher:
    image: ozzb2b-matcher:local
    # Build context is the repo root because the shared protos live at `./proto`.
    build:
      context: .
      dockerfile: apps/matcher/Dockerfile
    container_name: ozzb2b-matcher
    restart: unless-stopped
    environment:
      OZZB2B_MATCHER_HTTP_ADDR: "0.0.0.0:8090"
      OZZB2B_MATCHER_GRPC_ADDR: "0.0.0.0:9090"
      RUST_LOG: "info"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 6

  clickhouse:
    image: clickhouse/clickhouse-server:24.11
    container_name: ozzb2b-clickhouse
    restart: unless-stopped
    # Conservative limits for a shared VPS. ClickHouse defaults assume a
    # much bigger box; clamp memory/concurrency so it plays nice with
    # Postgres/Redis running on the host.
    environment:
      CLICKHOUSE_DB: ozzb2b
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ports:
      - "127.0.0.1:8123:8123"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - /var/www/ozzb2b.com/data/clickhouse:/var/lib/clickhouse
    mem_limit: 1g
    mem_reservation: 384m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping >/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 20

  events:
    image: ozzb2b-events:local
    build:
      context: ./apps/events
      dockerfile: Dockerfile
    container_name: ozzb2b-events
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      OZZB2B_EVENTS_HTTP_ADDR: ":8095"
      OZZB2B_CLICKHOUSE_URL: "http://clickhouse:8123"
      OZZB2B_CLICKHOUSE_DATABASE: "ozzb2b"
    ports:
      - "127.0.0.1:8095:8095"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      clickhouse:
        condition: service_healthy
