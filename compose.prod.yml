name: ozzb2b

# Production compose for the single-VPS deployment.
#
# Uses the host's existing Postgres and Redis (accessed via host.docker.internal
# or 172.17.0.1 on Linux hosts) to stay within the VPS memory budget.
# Meilisearch runs in-stack because it is small and stateless apart from its index volume.

services:
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: ozzb2b-meilisearch
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    env_file:
      - .env.prod
    environment:
      MEILI_ENV: production
      # MEILI_MASTER_KEY comes from `.env.prod` (`OZZB2B_MEILISEARCH_KEY` mapping if needed upstream).
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - /var/www/ozzb2b.com/data/meilisearch:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    image: ozzb2b-api:local
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ozzb2b-api
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      OZZB2B_ENV: production
    ports:
      - "127.0.0.1:8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').getcode()==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 6
    mem_limit: 384m
    mem_reservation: 128m

  web:
    image: ozzb2b-web:local
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ozzb2b-web
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      NODE_ENV: production
      OZZB2B_API_URL: http://api:8000
    ports:
      - "127.0.0.1:3101:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
    mem_limit: 512m
    mem_reservation: 128m

  scraper:
    image: ozzb2b-scraper:local
    build:
      context: ./apps/scraper
      dockerfile: Dockerfile
    container_name: ozzb2b-scraper
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      OZZB2B_ENV: production
    command:
      [
        "celery",
        "-A",
        "ozzb2b_scraper.tasks",
        "worker",
        "--loglevel=INFO",
        "--concurrency=1",
        # Recycle each worker after 100 tasks so accidental memory growth
        # (e.g. an exotic site that puffs up parsed objects) cannot creep
        # past the small VPS budget over a long-lived process.
        "--max-tasks-per-child=100",
      ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 256m
    mem_reservation: 64m

  chat:
    image: ozzb2b-chat:local
    build:
      context: ./apps/chat
      dockerfile: Dockerfile
    container_name: ozzb2b-chat
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      OZZB2B_CHAT_HTTP_ADDR: ":8090"
    ports:
      - "127.0.0.1:8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Distroless image has no shell/wget, so healthcheck uses a native binary
    # subcommand that probes /health and exits non-zero on failure.
    healthcheck:
      test: ["CMD", "/chat", "healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 6
    mem_limit: 64m
    mem_reservation: 32m

  matcher:
    image: ozzb2b-matcher:local
    # Build context is the repo root because the shared protos live at `./proto`.
    build:
      context: .
      dockerfile: apps/matcher/Dockerfile
    container_name: ozzb2b-matcher
    restart: unless-stopped
    environment:
      OZZB2B_MATCHER_HTTP_ADDR: "0.0.0.0:8090"
      OZZB2B_MATCHER_GRPC_ADDR: "0.0.0.0:9090"
      RUST_LOG: "info"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 6
    mem_limit: 64m
    mem_reservation: 32m

  clickhouse:
    image: clickhouse/clickhouse-server:24.11
    container_name: ozzb2b-clickhouse
    restart: unless-stopped
    # Conservative limits for a shared VPS. ClickHouse defaults assume a
    # much bigger box; clamp memory/concurrency so it plays nice with
    # Postgres/Redis running on the host.
    environment:
      CLICKHOUSE_DB: ozzb2b
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ports:
      - "127.0.0.1:8123:8123"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - /var/www/ozzb2b.com/data/clickhouse:/var/lib/clickhouse
      - ./infra/clickhouse/disable_system_logs.xml:/etc/clickhouse-server/config.d/disable_system_logs.xml:ro
      - ./infra/clickhouse/low_memory_prod.xml:/etc/clickhouse-server/config.d/low_memory_prod.xml:ro
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping >/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 20

  events:
    image: ozzb2b-events:local
    build:
      context: ./apps/events
      dockerfile: Dockerfile
    container_name: ozzb2b-events
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      OZZB2B_EVENTS_HTTP_ADDR: ":8095"
      OZZB2B_CLICKHOUSE_URL: "http://clickhouse:8123"
      OZZB2B_CLICKHOUSE_DATABASE: "ozzb2b"
    ports:
      - "127.0.0.1:8095:8095"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      clickhouse:
        condition: service_healthy
    # Distroless image has no shell/wget, so healthcheck uses a native binary
    # subcommand that probes /health and exits non-zero on failure.
    healthcheck:
      test: ["CMD", "/events", "healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 6
    mem_limit: 64m
    mem_reservation: 32m

  # ------------------ Phase 5.5: observability stack ------------------
  # Prometheus scrapes the /metrics endpoints each service already exposes.
  # Grafana ships with provisioned Prometheus + Loki datasources and the
  # default `ozzb2b — overview` dashboard. Loki + Promtail aggregate docker
  # logs of this compose project. Everything binds to 127.0.0.1 and is
  # exposed to the world only via the nginx `grafana.ozzb2b.com` vhost.

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ozzb2b-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=14d
      - --storage.tsdb.retention.size=1GB
      - --web.enable-lifecycle
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - /var/www/ozzb2b.com/data/prometheus:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:9090:9090"
    mem_limit: 256m
    mem_reservation: 128m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Host-level CPU/RAM/disk/network metrics.
  # Runs inside the compose network so Prometheus can reach it by DNS name
  # (`node_exporter:9100`). We still see the real VPS because we bind-mount
  # its /proc, /sys and / read-only with `--path.rootfs=/host`, and we share
  # pid + network namespaces with the host.
  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: ozzb2b-node-exporter
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs|var/lib/docker)($$|/)
      - --collector.filesystem.fs-types-exclude=^(tmpfs|devtmpfs|overlay|squashfs|fuse.*)$$
      - --web.listen-address=:9100
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    mem_limit: 64m
    mem_reservation: 32m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9100/metrics >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Host process-group metrics. This fills the gap between node_exporter
  # (whole-host CPU) and cAdvisor (cgroups/containers), so CPU alerts can name
  # the workload family that was hot when the alert fired.
  process_exporter:
    image: ncabatoff/process-exporter:v0.8.7
    container_name: ozzb2b-process-exporter
    restart: unless-stopped
    pid: host
    command:
      - -procfs
      - /host/proc
      - -config.path
      - /config/process-exporter.yml
      - -web.listen-address
      - :9256
    volumes:
      - /proc:/host/proc:ro
      - ./infra/process-exporter/config.yml:/config/process-exporter.yml:ro
    ports:
      - "127.0.0.1:9256:9256"
    read_only: true
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m
    mem_reservation: 32m

  # Per-container CPU/RAM/disk/network + Docker stats.
  # Pinned to v0.47.2: newer 0.49.x silently stops emitting per-container
  # series on hosts using Docker's overlay2 storage driver.
  # We also drop --docker_only so cAdvisor falls back to raw cgroup scanning
  # when its Docker-API discovery path errors out (known issue with overlay2).
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: ozzb2b-cadvisor
    restart: unless-stopped
    privileged: true
    command:
      - --housekeeping_interval=30s
      - --store_container_labels=false
      - --whitelisted_container_labels=com.docker.compose.service,com.docker.compose.project
    ports:
      - "127.0.0.1:8088:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg:/dev/kmsg
    mem_limit: 192m
    mem_reservation: 96m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Alertmanager is opt-in: the `alertmanager.yml` file is rendered on the VPS
  # only when Telegram bot creds are present in /root/.ozzb2b_secrets. Until
  # then the `alerts` profile stays inactive so compose won't try to start it.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ozzb2b-alertmanager
    restart: unless-stopped
    profiles: ["alerts"]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.listen-address=:9093
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /var/www/ozzb2b.com/data/alertmanager:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    mem_limit: 96m
    mem_reservation: 48m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.2.0
    container_name: ozzb2b-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - /var/www/ozzb2b.com/data/loki:/loki
    ports:
      - "127.0.0.1:3100:3100"
    mem_limit: 256m
    mem_reservation: 128m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  promtail:
    image: grafana/promtail:3.2.0
    container_name: ozzb2b-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/www/ozzb2b.com/data/promtail:/positions
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    mem_limit: 96m
    mem_reservation: 32m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9080/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.3.0
    container_name: ozzb2b-grafana
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      GF_SECURITY_ADMIN_USER: "${OZZB2B_GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${OZZB2B_GRAFANA_ADMIN_PASSWORD:-change_me_in_prod}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "https://grafana.ozzb2b.com"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - /var/www/ozzb2b.com/data/grafana:/var/lib/grafana
    ports:
      - "127.0.0.1:3102:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    mem_limit: 192m
    mem_reservation: 96m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
