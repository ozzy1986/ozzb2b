[project]
name = "ozzb2b-scraper"
version = "0.1.0"
description = "ozzb2b scraping worker"
requires-python = ">=3.12"
dependencies = [
    "scrapy>=2.11,<3",
    "playwright>=1.48,<2",
    "celery[redis]>=5.4,<6",
    "httpx>=0.27,<0.28",
    "structlog>=24.4,<25",
    "pydantic>=2.9,<3",
    "pydantic-settings>=2.6,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3,<9",
    "ruff>=0.7,<0.8",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
