name: ci

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------- Language-level test matrices ----------------

  api:
    name: api (python)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy src
      - name: Test with coverage
        run: pytest
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-api
          path: apps/api/coverage.xml
          if-no-files-found: ignore

  web:
    name: web (next.js)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          # Lockfile isn't committed (see apps/web/.gitignore comment); cache
          # key tracks package.json so we still get a warm npm cache hit
          # when dependency declarations don't change.
          cache: npm
          cache-dependency-path: apps/web/package.json
      - name: Install
        # Lock file resolved with --legacy-peer-deps (react 19 RC peers), so
        # use the same flag here; `npm ci` would drop extraneous deps but
        # it refuses the existing lockfile when dependency graphs shift.
        #
        # The second install pulls the Linux-specific Rollup native binary
        # that npm's optional-deps bug sometimes skips. It MUST carry
        # --legacy-peer-deps as well, otherwise npm re-resolves the whole
        # tree and fails on react@19.0.0-rc vs @testing-library/react peers.
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          npm install --legacy-peer-deps --no-save --no-audit --no-fund \
            @rollup/rollup-linux-x64-gnu
      - name: Typecheck
        run: npm run typecheck
      - name: Diagnostic
        # Helps future debugging: prints vitest / jsdom versions so CI logs
        # reveal environment drift vs. local runs.
        run: npx vitest --version && node -e "console.log('node', process.version)"
      - name: Test (lib)
        run: npm run test:lib
      - name: Test (components)
        run: npm run test
      - name: Coverage (informational)
        continue-on-error: true
        run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-web
          path: apps/web/coverage/lcov.info
          if-no-files-found: ignore

  chat:
    name: chat (go)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/chat
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # Pinned to 1.25 so the stdlib CVEs surfaced by govulncheck are
          # already patched in the binary we build and test.
          go-version: "1.25"
          # Explicit path to go.sum: setup-go's default cache lookup walks the
          # repo root, but our Go modules live under apps/<svc>; without this
          # the cache step logs "Dependencies file is not found".
          cache-dependency-path: apps/chat/go.sum
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test with race + coverage
        run: |
          chmod +x ../../scripts/check_go_coverage.sh
          ../../scripts/check_go_coverage.sh . 55
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-chat
          path: apps/chat/coverage.out
          if-no-files-found: ignore

  events:
    name: events (go)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/events
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # Same rationale as the chat job — 1.25 clears stdlib CVEs.
          go-version: "1.25"
          cache-dependency-path: apps/events/go.sum
      - run: go vet ./...
      - run: go build ./...
      - name: Test with race + coverage
        # Events consumer is mostly wiring; business logic lives in the API
        # which has a far stricter gate. Floor kept at 20% until we add more
        # pipeline tests; raise incrementally as coverage grows.
        run: |
          chmod +x ../../scripts/check_go_coverage.sh
          ../../scripts/check_go_coverage.sh . 20
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-events
          path: apps/events/coverage.out
          if-no-files-found: ignore

  matcher:
    name: matcher (rust)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/matcher
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/matcher
      - name: protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        run: cargo build --all-targets
      - name: test
        run: cargo test --all-targets

  integration-api:
    name: integration api (postgres + redis)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ozzb2b
          POSTGRES_PASSWORD: ozzb2b
          POSTGRES_DB: ozzb2b_test
        ports:
          - 5432:5432
        # Wait until the DB actually accepts connections; without this the
        # test job starts before Postgres is ready and flakes on cold runners.
        options: >-
          --health-cmd "pg_isready -U ozzb2b -d ozzb2b_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      OZZB2B_INTEGRATION_DATABASE_URL: postgresql+asyncpg://ozzb2b:ozzb2b@127.0.0.1:5432/ozzb2b_test
      OZZB2B_INTEGRATION_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run integration suite
        # Coverage is enforced in the unit job; here we only care about
        # behaviour against real services. The Alembic round-trip test
        # exercises every migration's down() path on a throwaway Postgres
        # schema, catching irreversible migrations before they reach prod.
        env:
          OZZB2B_DATABASE_URL: postgresql+psycopg://ozzb2b:ozzb2b@127.0.0.1:5432/ozzb2b_test
        run: pytest tests/integration -m integration -v --no-cov

  scraper:
    name: scraper (python)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/scraper
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test with coverage
        run: pytest
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-scraper
          path: apps/scraper/coverage.xml
          if-no-files-found: ignore

  # ---------------- Contract / artifact integrity ----------------

  proto-drift:
    name: proto drift (python stubs)
    # Hard gate: any generated-stub drift must be committed with the proto
    # change so API clients stay reproducible.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install protoc + grpc tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
          python -m pip install --upgrade pip
          pip install "grpcio-tools==1.67.1" "protobuf==5.27.2"
      - name: Regenerate Python stubs from proto/
        run: |
          mkdir -p .tmp-gen
          python -m grpc_tools.protoc \
            -Iproto \
            --python_out=.tmp-gen \
            --grpc_python_out=.tmp-gen \
            proto/ozzb2b/matcher/v1/matcher.proto
      - name: Compare with committed stubs
        run: |
          set -e
          # grpc_tools emits absolute imports into the top-level package; we
          # compare only the generated pb2 files for drift detection.
          diff -u apps/api/src/ozzb2b_api/grpc_gen/ozzb2b/matcher/v1/matcher_pb2.py \
            .tmp-gen/ozzb2b/matcher/v1/matcher_pb2.py || (
              echo "proto/ changed but generated stubs were not regenerated."
              echo "Run: python -m grpc_tools.protoc -Iproto --python_out=apps/api/src/ozzb2b_api/grpc_gen --grpc_python_out=apps/api/src/ozzb2b_api/grpc_gen proto/ozzb2b/matcher/v1/matcher.proto"
              exit 1
            )

  e2e:
    name: e2e (playwright, 3 viewports)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web/package.json
            apps/e2e/package.json
      - name: Install web deps
        working-directory: apps/web
        # Same peer-resolution dance as the `web` job: the second install
        # also needs --legacy-peer-deps or npm re-resolves the graph and
        # fails on react@19.0.0-rc peers.
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          npm install --legacy-peer-deps --no-save --no-audit --no-fund \
            @rollup/rollup-linux-x64-gnu
      - name: Build web
        working-directory: apps/web
        env:
          # Build without a real API: pages gracefully render with empty data
          # and tests only exercise the shell / client-side validation.
          OZZB2B_API_URL: http://127.0.0.1:9
          NEXT_PUBLIC_OZZB2B_API_URL: http://127.0.0.1:9
        run: npm run build
      - name: Install e2e deps
        working-directory: apps/e2e
        run: npm install --no-audit --no-fund
      - name: Install browsers
        working-directory: apps/e2e
        run: npx playwright install --with-deps chromium webkit
      - name: Run Playwright
        working-directory: apps/e2e
        run: npx playwright test
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/e2e/playwright-report
          if-no-files-found: ignore

  coverage-diff:
    name: coverage diff (changed lines)
    # Only meaningful on PRs — we compare versus the PR base branch. On push
    # to master there's no useful baseline, so the job is skipped.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    needs: [api, web]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install diff-cover
        run: pip install "diff-cover>=9,<10"
      - name: Fetch base branch
        run: git fetch --no-tags --depth=0 origin ${{ github.base_ref }}:${{ github.base_ref }} || true
      - name: Download api coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-api
          path: coverage-artifacts/api
      - name: Download web coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-web
          path: coverage-artifacts/web
        continue-on-error: true
      - name: Diff coverage (api)
        # Hard gate: every changed Python line in apps/api must be covered
        # at >=90%. The catch-all coverage floor lives in pyproject.toml; this
        # job stops slow drift by holding new code to a higher bar.
        run: |
          diff-cover coverage-artifacts/api/coverage.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=90
      - name: Diff coverage (web, informational)
        # LCOV report is emitted by vitest's v8 coverage and only when the
        # test:coverage step itself succeeds; keep this informational until
        # the web suite coverage stabilises.
        continue-on-error: true
        run: |
          if [ -f coverage-artifacts/web/lcov.info ]; then
            diff-cover coverage-artifacts/web/lcov.info \
              --compare-branch=origin/${{ github.base_ref }} \
              --fail-under=80
          else
            echo "no web lcov report found — skipping"
          fi

  infra-validate:
    name: infra validate (compose + nginx)
    # Hard gate: prevents broken compose files or nginx configs from landing
    # in master — they would otherwise only surface during a VPS deploy.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Write a stub .env.prod so interpolation resolves
        run: |
          touch .env.prod
          # compose.prod.yml interpolates these at parse time; we just need any
          # value so `docker compose config` validates the structural shape.
          for v in \
            OZZB2B_POSTGRES_PASSWORD \
            OZZB2B_REDIS_PASSWORD \
            OZZB2B_JWT_SECRET \
            OZZB2B_MEILI_MASTER_KEY \
            OZZB2B_CLICKHOUSE_PASSWORD \
            OZZB2B_GRAFANA_ADMIN_PASSWORD \
            OZZB2B_ALERTMANAGER_TELEGRAM_TOKEN \
            OZZB2B_ALERTMANAGER_TELEGRAM_CHAT_ID; do
            echo "$v=ci-stub" >> .env.prod
          done
      - name: Validate compose.dev.yml
        run: docker compose -f compose.dev.yml config -q
      - name: Validate compose.prod.yml
        run: docker compose --env-file .env.prod -f compose.prod.yml config -q
      - name: Lint nginx vhosts with nginx -t
        run: |
          # Run a throwaway nginx container per vhost. On the VPS, certbot
          # writes the Let's Encrypt bits into /etc/letsencrypt/*; we can't
          # ship those into CI, so we generate a self-signed throwaway cert
          # plus stubs for the certbot-managed include files. This keeps the
          # linter focused on SYNTAX drift, which is the only thing a CI gate
          # can meaningfully catch before a live deploy.
          set -e
          mkdir -p .tmp-nginx/letsencrypt/live/ozzb2b.com
          mkdir -p .tmp-nginx/letsencrypt/live/api.ozzb2b.com
          mkdir -p .tmp-nginx/letsencrypt/live/grafana.ozzb2b.com
          mkdir -p .tmp-nginx/snippets
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout .tmp-nginx/letsencrypt/live/ozzb2b.com/privkey.pem \
            -out    .tmp-nginx/letsencrypt/live/ozzb2b.com/fullchain.pem \
            -days 1 -subj "/CN=ci-stub"
          for host in api.ozzb2b.com grafana.ozzb2b.com; do
            cp .tmp-nginx/letsencrypt/live/ozzb2b.com/privkey.pem \
               .tmp-nginx/letsencrypt/live/$host/privkey.pem
            cp .tmp-nginx/letsencrypt/live/ozzb2b.com/fullchain.pem \
               .tmp-nginx/letsencrypt/live/$host/fullchain.pem
          done
          # Empty stubs for certbot-managed includes referenced by the vhosts.
          : > .tmp-nginx/letsencrypt/options-ssl-nginx.conf
          # Minimal snippet used by ozzb2b.com + grafana vhosts.
          cat > .tmp-nginx/snippets/ssl-modern.conf <<'SNIP'
          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_prefer_server_ciphers on;
          SNIP

          for f in infra/nginx/*.conf; do
            echo "--- $f"
            cp "$f" .tmp-nginx/vhost.conf
            # Certbot-managed lines are environment artifacts, not syntax owned
            # by this repo. Strip them in CI so nginx -t validates our config
            # structure without requiring production key material.
            sed -i '/options-ssl-nginx\.conf/d' .tmp-nginx/vhost.conf
            sed -i '/ssl_dhparam/d' .tmp-nginx/vhost.conf
            docker run --rm \
              -v "$PWD/.tmp-nginx/vhost.conf:/etc/nginx/conf.d/vhost.conf:ro" \
              -v "$PWD/.tmp-nginx/letsencrypt:/etc/letsencrypt:ro" \
              -v "$PWD/.tmp-nginx/snippets:/etc/nginx/snippets:ro" \
              nginx:1.27-alpine nginx -t
          done

  docker-build:
    name: docker build (${{ matrix.service }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, chat, events, matcher, scraper]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          # matcher Dockerfile expects repo root (needs ./proto), others use their own dir.
          context: ${{ matrix.service == 'matcher' && '.' || format('apps/{0}', matrix.service) }}
          file: ${{ matrix.service == 'matcher' && 'apps/matcher/Dockerfile' || format('apps/{0}/Dockerfile', matrix.service) }}
          push: false
          # `load: true` makes the image available to the local docker daemon
          # so the trivy-image scan job can pick it up without re-building.
          load: true
          tags: ozzb2b-${{ matrix.service }}:ci
      - name: Trivy image scan
        # Hard gate on the runtime image (OS + bundled deps), not just the
        # source tree. `trivy fs` already covers source CVEs; this job catches
        # base-image rot that source scans can't see.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ozzb2b-${{ matrix.service }}:ci
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"
          vuln-type: os,library

  # ---------------- Security scans ----------------

  security-python:
    name: security (python)
    # Hard gate: high-confidence Python security findings block merge.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install audit tools
        run: |
          python -m venv "$RUNNER_TEMP/security-tools"
          "$RUNNER_TEMP/security-tools/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/security-tools/bin/pip" install pip-audit bandit
          echo "$RUNNER_TEMP/security-tools/bin" >> "$GITHUB_PATH"
      - name: pip-audit api dependencies
        working-directory: apps/api
        # Audit the resolved project dependency set, not the GitHub runner's
        # packaging/audit tools. `pip`, `setuptools`, and `wheel` are CI build
        # tooling, while `ozzb2b-api` is skipped as an editable local package
        # with no PyPI advisory entry.
        #
        # IGNORED CVEs (each with a justification):
        #   * CVE-2025-71176 (pytest) — only a code-path in collection of
        #     maliciously crafted test output; dev-only, not in runtime.
        #   * CVE-2026-4539 (pygments) — ReDoS in Markdown lexer; we don't
        #     render untrusted Markdown with Pygments anywhere.
        #   * PYSEC-2025-49 (setuptools) — build-time tool vulnerability.
        # Every other finding must be fixed by bumping the constraint in
        # pyproject.toml.
        run: |
          python -m venv "$RUNNER_TEMP/api-audit-env"
          "$RUNNER_TEMP/api-audit-env/bin/python" -m pip install --upgrade pip setuptools
          "$RUNNER_TEMP/api-audit-env/bin/pip" install -e "."
          "$RUNNER_TEMP/api-audit-env/bin/python" -m pip freeze \
            --exclude-editable \
            --exclude pip \
            --exclude setuptools \
            --exclude wheel \
            > "$RUNNER_TEMP/ozzb2b-api-audit-requirements.txt"
          pip-audit -r "$RUNNER_TEMP/ozzb2b-api-audit-requirements.txt" \
            --ignore-vuln CVE-2025-71176 \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln PYSEC-2025-49
      - name: bandit (api)
        working-directory: apps/api
        run: bandit -q -r src -x src/ozzb2b_api/grpc_gen
      - name: bandit (scraper)
        working-directory: apps/scraper
        run: bandit -q -r src

  security-go:
    name: security (go)
    # Hard gate: Go dependency/runtime vulns block merge.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # govulncheck@latest requires Go >= 1.25; also bumping toolchain
          # here clears the stdlib CVEs that are only fixed in 1.25.x.
          go-version: "1.25"
          # Both Go modules participate in this scan — feed both go.sum files
          # so the dependency cache key reflects either module changing.
          cache-dependency-path: |
            apps/chat/go.sum
            apps/events/go.sum
      - name: govulncheck chat
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: apps/chat
      - name: govulncheck events
        run: govulncheck ./...
        working-directory: apps/events

  security-rust:
    name: security (rust)
    # Hard gate: Rust advisories block merge.
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/matcher
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/matcher
      - name: cargo-audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  security-fs:
    name: security (filesystem trivy)
    # Hard gate: critical filesystem vulnerabilities block merge.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          skip-dirs: node_modules,target,.venv,apps/web/.next
          exit-code: "1"

  secret-scan:
    name: secret scan (gitleaks)
    # Secrets must NEVER land in the repo. This is a hard gate — any finding
    # fails the build and blocks the PR from merging.
    runs-on: ubuntu-24.04
    # gitleaks-action@v2 is the latest published tag and still ships
    # `runs.using: node20`. Until upstream cuts a Node 24 release, we
    # opt the runner into Node 24 explicitly so the workflow stays
    # warning-free without holding back on a stale runtime.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pre-commit:
    name: pre-commit
    # Runs the same hooks contributors get locally so the repo never lands a
    # PR that violates the configured ruff / yaml / large-file / private-key
    # / gitleaks rules.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pre-commit
        run: pip install "pre-commit>=4,<5"
      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  web-ru-only:
    name: web ru-only (static)
    # User-facing UI must be Russian. This grep-based gate catches the most
    # common drift (English literals leaking into JSX) without trying to be
    # a full-blown i18n linter — see scripts/check_web_ru_only.sh for the
    # allowlist of approved technical tokens (URLs, brand names, etc.).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run RU-only check
        run: |
          chmod +x scripts/check_web_ru_only.sh
          ./scripts/check_web_ru_only.sh

  # ---------------- Final gate ----------------

  ci-ok:
    name: ci ok
    # Hard gate: every core test/build plus contract, security and (on PRs)
    # coverage-diff must pass. `coverage-diff` only runs on pull_request, so
    # we use `if: always()` + an explicit results check that treats a
    # deliberately skipped job as success and any failure/cancellation as a
    # hard fail. Without this pattern, adding a conditional dependency to
    # `needs` would skip `ci-ok` on pushes to master and turn the gate off.
    if: ${{ always() }}
    needs:
      - api
      - web
      - chat
      - events
      - matcher
      - scraper
      - integration-api
      - e2e
      - docker-build
      - infra-validate
      - proto-drift
      - secret-scan
      - security-python
      - security-go
      - security-rust
      - security-fs
      - coverage-diff
      - pre-commit
      - web-ru-only
    runs-on: ubuntu-24.04
    steps:
      - name: Validate required job results
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          set -eu
          echo "$RESULTS"
          failed=$(printf '%s' "$RESULTS" \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print('\n'.join(k for k,v in data.items() if v.get('result') in ('failure','cancelled')))")
          if [ -n "$failed" ]; then
            echo "::error::required jobs failed or were cancelled: $failed"
            exit 1
          fi
          echo "all required jobs passed (or were intentionally skipped)"
