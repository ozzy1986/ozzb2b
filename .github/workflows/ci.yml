name: ci

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------- Language-level test matrices ----------------

  api:
    name: api (python)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy src
      - name: Test with coverage
        run: pytest
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: apps/api/coverage.xml
          if-no-files-found: ignore

  web:
    name: web (next.js)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Lockfile isn't committed (see apps/web/.gitignore comment); cache
          # key tracks package.json so we still get a warm npm cache hit
          # when dependency declarations don't change.
          cache: npm
          cache-dependency-path: apps/web/package.json
      - name: Install
        # Lock file resolved with --legacy-peer-deps (react 19 RC peers), so
        # use the same flag here; `npm ci` would drop extraneous deps but
        # it refuses the existing lockfile when dependency graphs shift.
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          # npm optional deps may be skipped in CI; install rollup native
          # binary explicitly to avoid flaky startup failures.
          npm install --no-save @rollup/rollup-linux-x64-gnu
      - name: Typecheck
        run: npm run typecheck
      - name: Diagnostic
        # Helps future debugging: prints vitest / jsdom versions so CI logs
        # reveal environment drift vs. local runs.
        run: npx vitest --version && node -e "console.log('node', process.version)"
      - name: Test (lib)
        run: npm run test:lib
      - name: Test (components)
        run: npm run test
      - name: Coverage (informational)
        continue-on-error: true
        run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: apps/web/coverage/lcov.info
          if-no-files-found: ignore

  chat:
    name: chat (go)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/chat
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test with race + coverage
        run: |
          chmod +x ../../scripts/check_go_coverage.sh
          ../../scripts/check_go_coverage.sh . 55
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-chat
          path: apps/chat/coverage.out
          if-no-files-found: ignore

  events:
    name: events (go)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/events
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go vet ./...
      - run: go build ./...
      - name: Test with race + coverage
        # Events consumer is mostly wiring; business logic lives in the API
        # which has a far stricter gate. Floor kept at 20% until we add more
        # pipeline tests; raise incrementally as coverage grows.
        run: |
          chmod +x ../../scripts/check_go_coverage.sh
          ../../scripts/check_go_coverage.sh . 20
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-events
          path: apps/events/coverage.out
          if-no-files-found: ignore

  matcher:
    name: matcher (rust)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/matcher
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/matcher
      - name: protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        run: cargo build --all-targets
      - name: test
        run: cargo test --all-targets

  integration-api:
    name: integration api (postgres + redis)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ozzb2b
          POSTGRES_PASSWORD: ozzb2b
          POSTGRES_DB: ozzb2b_test
        ports:
          - 5432:5432
        # Wait until the DB actually accepts connections; without this the
        # test job starts before Postgres is ready and flakes on cold runners.
        options: >-
          --health-cmd "pg_isready -U ozzb2b -d ozzb2b_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      OZZB2B_INTEGRATION_DATABASE_URL: postgresql+asyncpg://ozzb2b:ozzb2b@127.0.0.1:5432/ozzb2b_test
      OZZB2B_INTEGRATION_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run integration suite
        # Coverage is enforced in the unit job; here we only care about
        # behaviour against real services.
        run: pytest tests/integration -m integration -v --no-cov

  scraper:
    name: scraper (python)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test with coverage
        run: pytest
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-scraper
          path: apps/scraper/coverage.xml
          if-no-files-found: ignore

  # ---------------- Contract / artifact integrity ----------------

  proto-drift:
    name: proto drift (python stubs)
    # Informational: grpcio-tools output includes a binary-ish serialized
    # descriptor that can drift across protoc minor versions even for
    # semantically identical .proto files. We still run it every PR so a
    # real public-API change is obvious in the logs.
    continue-on-error: true
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install protoc + grpc tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
          python -m pip install --upgrade pip
          pip install "grpcio-tools==1.67.1" "protobuf==5.27.2"
      - name: Regenerate Python stubs from proto/
        run: |
          mkdir -p .tmp-gen
          python -m grpc_tools.protoc \
            -Iproto \
            --python_out=.tmp-gen \
            --grpc_python_out=.tmp-gen \
            proto/ozzb2b/matcher/v1/matcher.proto
      - name: Compare with committed stubs
        run: |
          set -e
          # grpc_tools emits absolute imports into the top-level package; we
          # compare only the generated pb2 files for drift detection.
          diff -u apps/api/src/ozzb2b_api/grpc_gen/ozzb2b/matcher/v1/matcher_pb2.py \
            .tmp-gen/ozzb2b/matcher/v1/matcher_pb2.py || (
              echo "proto/ changed but generated stubs were not regenerated."
              echo "Run: python -m grpc_tools.protoc -Iproto --python_out=apps/api/src/ozzb2b_api/grpc_gen --grpc_python_out=apps/api/src/ozzb2b_api/grpc_gen proto/ozzb2b/matcher/v1/matcher.proto"
              exit 1
            )

  e2e:
    name: e2e (playwright, 3 viewports)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web/package.json
            apps/e2e/package.json
      - name: Install web deps
        working-directory: apps/web
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          npm install --no-save @rollup/rollup-linux-x64-gnu
      - name: Build web
        working-directory: apps/web
        env:
          # Build without a real API: pages gracefully render with empty data
          # and tests only exercise the shell / client-side validation.
          OZZB2B_API_URL: http://127.0.0.1:9
          NEXT_PUBLIC_OZZB2B_API_URL: http://127.0.0.1:9
        run: npm run build
      - name: Install e2e deps
        working-directory: apps/e2e
        run: npm install --no-audit --no-fund
      - name: Install browsers
        working-directory: apps/e2e
        run: npx playwright install --with-deps chromium webkit
      - name: Run Playwright
        working-directory: apps/e2e
        run: npx playwright test
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report
          if-no-files-found: ignore

  coverage-diff:
    name: coverage diff (changed lines)
    # Only meaningful on PRs — we compare versus the PR base branch. On push
    # to master there's no useful baseline, so the job is skipped.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install diff-cover
        run: pip install "diff-cover>=9,<10"
      - name: Fetch base branch
        run: git fetch --no-tags --depth=0 origin ${{ github.base_ref }}:${{ github.base_ref }} || true
      - name: Download api coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-api
          path: coverage-artifacts/api
      - name: Download web coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-web
          path: coverage-artifacts/web
        continue-on-error: true
      - name: Diff coverage (api)
        run: |
          diff-cover coverage-artifacts/api/coverage.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=85
      - name: Diff coverage (web, informational)
        # LCOV report is emitted by vitest's v8 coverage and only when the
        # test:coverage step itself succeeds; keep this informational until
        # the web suite coverage stabilises.
        continue-on-error: true
        run: |
          if [ -f coverage-artifacts/web/lcov.info ]; then
            diff-cover coverage-artifacts/web/lcov.info \
              --compare-branch=origin/${{ github.base_ref }} \
              --fail-under=80
          else
            echo "no web lcov report found — skipping"
          fi

  docker-build:
    name: docker build (${{ matrix.service }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, chat, events, matcher, scraper]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          # matcher Dockerfile expects repo root (needs ./proto), others use their own dir.
          context: ${{ matrix.service == 'matcher' && '.' || format('apps/{0}', matrix.service) }}
          file: ${{ matrix.service == 'matcher' && 'apps/matcher/Dockerfile' || format('apps/{0}/Dockerfile', matrix.service) }}
          push: false
          load: false
          tags: ozzb2b-${{ matrix.service }}:ci

  # ---------------- Security scans ----------------

  security-python:
    name: security (python)
    # Security findings are informational on the first pass. Fix known hits,
    # then flip `continue-on-error` to `false` and make this a hard gate.
    continue-on-error: true
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit
      - name: pip-audit api dependencies
        working-directory: apps/api
        run: |
          pip install -e "."
          pip freeze > /tmp/api-requirements.txt
          pip-audit --strict -r /tmp/api-requirements.txt
      - name: bandit (api)
        working-directory: apps/api
        run: bandit -q -r src -x src/ozzb2b_api/grpc_gen
      - name: bandit (scraper)
        working-directory: apps/scraper
        run: bandit -q -r src

  security-go:
    name: security (go)
    continue-on-error: true
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: govulncheck chat
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: apps/chat
      - name: govulncheck events
        run: govulncheck ./...
        working-directory: apps/events

  security-rust:
    name: security (rust)
    continue-on-error: true
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/matcher
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/matcher
      - name: cargo-audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  security-fs:
    name: security (filesystem trivy)
    # Informational: legacy/* still ships vendored vendor deps we intend to
    # delete. Once legacy is gone we can flip exit-code back to "1".
    continue-on-error: true
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          skip-dirs: legacy,node_modules,target,.venv,apps/web/.next
          exit-code: "0"

  secret-scan:
    name: secret scan (gitleaks)
    # Secrets must NEVER land in the repo. This is a hard gate — any finding
    # fails the build and blocks the PR from merging.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------- Final gate ----------------

  ci-ok:
    name: ci ok
    # Hard gate: unit + integration tests per service, docker build matrix,
    # end-to-end smoke, and the secret scan. proto-drift + security-* audits
    # remain informational (see `continue-on-error: true` on each job) until
    # we triage their backlogs.
    needs:
      - api
      - web
      - chat
      - events
      - matcher
      - scraper
      - integration-api
      - e2e
      - docker-build
      - secret-scan
    runs-on: ubuntu-24.04
    steps:
      - run: echo "all required jobs passed"
