name: nightly

# Full-matrix safety net that runs independently of PR/push traffic.
# Catches: drift in upstream images, new CVEs in transitive deps, and
# integration/e2e regressions that only surface with real Postgres/Redis.
#
# Runs every day at 03:15 UTC (~06:15 MSK) and can be triggered manually.

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: integration (postgres + redis) [nightly]
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ozzb2b
          POSTGRES_PASSWORD: ozzb2b
          POSTGRES_DB: ozzb2b_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ozzb2b -d ozzb2b_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      OZZB2B_INTEGRATION_DATABASE_URL: postgresql+asyncpg://ozzb2b:ozzb2b@127.0.0.1:5432/ozzb2b_test
      OZZB2B_INTEGRATION_REDIS_URL: redis://127.0.0.1:6379/0
      OZZB2B_DATABASE_URL: postgresql+psycopg://ozzb2b:ozzb2b@127.0.0.1:5432/ozzb2b_test
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run integration suite (incl. alembic round-trip)
        run: pytest tests/integration -m integration -v --no-cov

  security-all:
    name: security (all languages) [nightly]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip setuptools
          pip install pip-audit bandit
      - name: pip-audit api dependencies
        working-directory: apps/api
        run: |
          pip install -e "."
          pip-audit --skip-editable \
            --ignore-vuln CVE-2025-71176 \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln PYSEC-2025-49
      - name: pip-audit scraper dependencies
        working-directory: apps/scraper
        run: |
          pip install -e "."
          pip-audit --skip-editable \
            --ignore-vuln CVE-2025-71176 \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln PYSEC-2025-49
      - name: bandit
        run: |
          bandit -q -r apps/api/src -x apps/api/src/ozzb2b_api/grpc_gen
          bandit -q -r apps/scraper/src

  e2e-matrix:
    name: e2e (3 viewports) [nightly]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install web deps
        working-directory: apps/web
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          npm install --legacy-peer-deps --no-save --no-audit --no-fund \
            @rollup/rollup-linux-x64-gnu
      - name: Build web
        working-directory: apps/web
        env:
          OZZB2B_API_URL: http://127.0.0.1:9
          NEXT_PUBLIC_OZZB2B_API_URL: http://127.0.0.1:9
        run: npm run build
      - name: Install e2e deps
        working-directory: apps/e2e
        run: npm install --no-audit --no-fund
      - name: Install browsers
        working-directory: apps/e2e
        run: npx playwright install --with-deps chromium webkit firefox
      - name: Run Playwright
        working-directory: apps/e2e
        run: npx playwright test

  nightly-ok:
    name: nightly ok
    needs: [integration, security-all, e2e-matrix]
    runs-on: ubuntu-24.04
    steps:
      - run: echo "nightly safety net passed"
