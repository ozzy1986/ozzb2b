version: 2
# Keep every ecosystem we ship on a weekly security/patch/minor bump cadence
# so the gitleaks/govulncheck/cargo-audit/pip-audit gates don't have to
# hand-apply CVE patches. Routine major upgrades are ignored here because they
# often require source, runtime, or CI migrations; handle them deliberately in
# dedicated branches. Security updates are still allowed.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /apps/scraper
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      node-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /apps/e2e
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      e2e-node-deps:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /apps/chat
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /apps/events
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /apps/matcher
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      rust-deps:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /apps/chat
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /apps/events
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /apps/matcher
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /apps/scraper
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
