# Prometheus scrape + alerting config for the ozzb2b production stack.
#
# - Scrapes the `/metrics` endpoints the services already expose.
# - Adds host (node_exporter) and per-container (cAdvisor) sources so we
#   can see CPU/RAM/disk pressure on the VPS itself, not just app-level
#   metrics.
# - Loads alert rules from `/etc/prometheus/rules/*.yml`.
# - Ships firing alerts to a single Alertmanager, which fan-outs to Telegram.

global:
  scrape_interval: 15s
  scrape_timeout: 5s
  evaluation_interval: 30s
  external_labels:
    env: production
    deployment: ozzb2b

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
    follow_redirects: true

  - job_name: chat
    metrics_path: /metrics
    static_configs:
      - targets: ["chat:8090"]

  - job_name: events
    metrics_path: /metrics
    static_configs:
      - targets: ["events:8095"]

  - job_name: matcher
    metrics_path: /metrics
    static_configs:
      - targets: ["matcher:8090"]

  # Host metrics: node_exporter runs inside the compose network with host /proc,
  # /sys and / bind-mounted read-only + pid=host, so the numbers reflect the VPS.
  - job_name: host
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          role: host

  # Host process groups from /proc. Used by alert annotations to show which
  # workload family was consuming CPU during a host-level spike.
  - job_name: process-exporter
    static_configs:
      - targets: ["process_exporter:9256"]
        labels:
          role: host

  # Per-container metrics (CPU/RAM/disk/network) from cAdvisor.
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
