# Prometheus scrape config for the ozzb2b production stack.
#
# We scrape the `/metrics` endpoints that each service already exposes over
# HTTP on the private Docker network. No public exposure; nginx returns 404
# for `/metrics` on the public vhost, so this is the only path that sees it.

global:
  scrape_interval: 15s
  scrape_timeout: 5s
  evaluation_interval: 30s
  external_labels:
    env: production
    deployment: ozzb2b

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
    # API protects /metrics with the security-headers middleware; follow redirects
    # just in case future middleware adds a 301 on trailing slash handling.
    follow_redirects: true

  - job_name: chat
    metrics_path: /metrics
    static_configs:
      - targets: ["chat:8090"]

  - job_name: events
    metrics_path: /metrics
    static_configs:
      - targets: ["events:8095"]

  - job_name: matcher
    metrics_path: /metrics
    static_configs:
      - targets: ["matcher:8090"]
