# nginx vhost for grafana.ozzb2b.com — Grafana is bound to 127.0.0.1:3001
# inside the Docker host network, we just proxy it.
#
# certbot --nginx will inject the SSL certificate and the HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name grafana.ozzb2b.com;

    location /.well-known/acme-challenge/ {
        root /var/www/ozzb2b.com;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grafana.ozzb2b.com;

    ssl_certificate     /etc/letsencrypt/live/grafana.ozzb2b.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.ozzb2b.com/privkey.pem;
    include snippets/ssl-modern.conf;

    access_log /var/log/nginx/grafana.ozzb2b.com_access.log;
    error_log  /var/log/nginx/grafana.ozzb2b.com_error.log;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Grafana has its own login form; we lock the dashboard down by disabling
    # anonymous access in the compose env. Still, keep the vhost internal-only
    # by default until we are confident in the admin password story by
    # responding with 444 if the certificate block has not been configured.

    client_max_body_size 16m;

    location /api/live/ {
        # Grafana's live features use WebSockets.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_pass http://127.0.0.1:3001;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:3001;
    }
}
