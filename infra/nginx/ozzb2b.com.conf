# nginx vhost for the new ozzb2b.com (Next.js SSR on 127.0.0.1:3001)
# Replaces the Phase-0 static placeholder served from /var/www/ozzb2b.com.
#
# certbot --nginx will inject the SSL certificate + http->https redirect.

server {
    listen 80;
    listen [::]:80;
    server_name ozzb2b.com www.ozzb2b.com;

    location /.well-known/acme-challenge/ {
        root /var/www/ozzb2b.com;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ozzb2b.com www.ozzb2b.com;

    ssl_certificate     /etc/letsencrypt/live/ozzb2b.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ozzb2b.com/privkey.pem;
    include snippets/ssl-modern.conf;

    access_log /var/log/nginx/ozzb2b.com_access.log;
    error_log  /var/log/nginx/ozzb2b.com_error.log;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    client_max_body_size 16m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:3001;
    }
}
