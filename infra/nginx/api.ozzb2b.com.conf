# nginx vhost for api.ozzb2b.com -> FastAPI on 127.0.0.1:8001
# certbot --nginx will manage the TLS cert and http->https redirect.

server {
    listen 80;
    listen [::]:80;
    server_name api.ozzb2b.com;

    location /.well-known/acme-challenge/ {
        root /var/www/ozzb2b.com;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.ozzb2b.com;

    ssl_certificate     /etc/letsencrypt/live/api.ozzb2b.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ozzb2b.com/privkey.pem;
    include snippets/ssl-modern.conf;

    access_log /var/log/nginx/api.ozzb2b.com_access.log;
    error_log  /var/log/nginx/api.ozzb2b.com_error.log;

    client_max_body_size 32m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:8001;
    }
}
