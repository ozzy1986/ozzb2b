# nginx vhost for api.ozzb2b.com
#
# * Regular HTTPS traffic is proxied to the FastAPI container on 127.0.0.1:8001.
# * The /chat/ws path is upgraded to a WebSocket and proxied to the Go chat
#   gateway on 127.0.0.1:8090. We strip the `/chat` prefix so the upstream
#   receives the plain `/ws?token=...` request.
# * SSL certs and the HTTP->HTTPS redirect are kept compatible with Certbot's
#   auto-managed blocks.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    server_name api.ozzb2b.com;

    location /.well-known/acme-challenge/ {
        root /var/www/ozzb2b.com;
    }

    # Block scrape of the internal metrics endpoint from the public internet.
    location = /metrics {
        return 404;
    }

    client_max_body_size 32m;

    # Defense-in-depth security headers. The API sets them too; nginx
    # guarantees they land even on proxy errors / redirects.
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # WebSocket gateway for the chat service.
    location /chat/ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived connections: disable read timeout for idle sockets.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # Strip the /chat prefix so the upstream only sees /ws.
        rewrite ^/chat/ws(/.*)?$ /ws$1 break;
        proxy_pass http://127.0.0.1:8090;
    }

    # Everything else goes to the FastAPI container.
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:8001;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.ozzb2b.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.ozzb2b.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = api.ozzb2b.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name api.ozzb2b.com;
    return 404; # managed by Certbot
}
