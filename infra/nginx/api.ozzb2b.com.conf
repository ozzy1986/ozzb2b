# nginx vhost for api.ozzb2b.com -> FastAPI on 127.0.0.1:8001
# HTTP only until DNS points here; certbot --nginx will add the HTTPS vhost
# and the 80->443 redirect when `deploy/vps_phase0_setup.sh` runs it.

server {
    listen 80;
    listen [::]:80;
    server_name api.ozzb2b.com;

    location /.well-known/acme-challenge/ {
        root /var/www/ozzb2b.com;
    }

    client_max_body_size 32m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:8001;
    }
}
