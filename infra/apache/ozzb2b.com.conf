# Apache reverse proxy for ozzb2b.com -> Next.js (127.0.0.1:3101)
# Existing sites on this VPS stay on Apache; ozzb2b stack listens on localhost only.

<VirtualHost *:80>
    ServerName ozzb2b.com
    ServerAlias www.ozzb2b.com

    DocumentRoot /var/www/ozzb2b.com
    <Directory /var/www/ozzb2b.com>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Alias /.well-known/acme-challenge/ /var/www/ozzb2b.com/.well-known/acme-challenge/
    <Directory /var/www/ozzb2b.com/.well-known/acme-challenge>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyRequests Off
    # Certbot duplicates this vhost for *:443; use the live request scheme.
    RequestHeader set X-Forwarded-Proto "expr=%{REQUEST_SCHEME}"
    RequestHeader set X-Forwarded-Port "expr=%{SERVER_PORT}"

    ProxyPass /.well-known/acme-challenge/ !
    ProxyPass / http://127.0.0.1:3101/
    ProxyPassReverse / http://127.0.0.1:3101/

    ErrorLog ${APACHE_LOG_DIR}/ozzb2b.com_error.log
    CustomLog ${APACHE_LOG_DIR}/ozzb2b.com_access.log combined
</VirtualHost>
