# Apache reverse proxy for Grafana on 127.0.0.1:3102.

<VirtualHost *:80>
    ServerName grafana.ozzb2b.com

    DocumentRoot /var/www/ozzb2b.com
    Alias /.well-known/acme-challenge/ /var/www/ozzb2b.com/.well-known/acme-challenge/
    <Directory /var/www/ozzb2b.com/.well-known/acme-challenge>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "expr=%{REQUEST_SCHEME}"
    RequestHeader set X-Forwarded-Port "expr=%{SERVER_PORT}"

    ProxyPass /.well-known/acme-challenge/ !

    # Grafana Live uses WebSockets.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/api/live/(.*)$ ws://127.0.0.1:3102/api/live/$1 [P,L]

    ProxyPass / http://127.0.0.1:3102/
    ProxyPassReverse / http://127.0.0.1:3102/

    ErrorLog ${APACHE_LOG_DIR}/grafana.ozzb2b.com_error.log
    CustomLog ${APACHE_LOG_DIR}/grafana.ozzb2b.com_access.log combined
</VirtualHost>
