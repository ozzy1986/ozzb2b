# Apache reverse proxy for api.ozzb2b.com
# - /chat/ws -> Go chat gateway 127.0.0.1:8090 (prefix stripped to /ws)
# - everything else -> FastAPI 127.0.0.1:8001

<VirtualHost *:80>
    ServerName api.ozzb2b.com

    DocumentRoot /var/www/ozzb2b.com
    Alias /.well-known/acme-challenge/ /var/www/ozzb2b.com/.well-known/acme-challenge/
    <Directory /var/www/ozzb2b.com/.well-known/acme-challenge>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyRequests Off
    # Certbot duplicates this vhost for *:443; use the live request scheme.
    RequestHeader set X-Forwarded-Proto "expr=%{REQUEST_SCHEME}"
    RequestHeader set X-Forwarded-Port "expr=%{SERVER_PORT}"

    ProxyPass /.well-known/acme-challenge/ !
    ProxyPass /metrics !

    # WebSocket chat gateway
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/chat/ws(/.*)?$ ws://127.0.0.1:8090/ws$1 [P,L]
    RewriteRule ^/chat/ws$ ws://127.0.0.1:8090/ws [P,L]

    ProxyPass /chat/ws ws://127.0.0.1:8090/ws
    ProxyPassReverse /chat/ws http://127.0.0.1:8090/ws

    ProxyPass / http://127.0.0.1:8001/
    ProxyPassReverse / http://127.0.0.1:8001/

    ErrorLog ${APACHE_LOG_DIR}/api.ozzb2b.com_error.log
    CustomLog ${APACHE_LOG_DIR}/api.ozzb2b.com_access.log combined
</VirtualHost>
